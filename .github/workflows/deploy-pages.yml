name: Deploy to GitHub Pages

# ينشر الموقع الثابت عند كل دفع إلى الفرع الرئيسي، أو يدوياً من تبويب Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

# الصلاحيات اللازمة لنشر GitHub Pages عبر OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# يمنع تسابق عمليات النشر: يُلغى أي نشر قيد التنفيذ عند بدء نشر أحدث.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # المستودع بأكمله هو الموقع (ملفات ثابتة في الجذر).
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
